<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GHOST TECH MD - V2</title>
    <style>
        :root { --main-green: #00ff88; --bg-dark: #050a0a; --card-bg: rgba(10, 20, 20, 0.9); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .dashboard { max-width: 400px; margin: auto; border: 1px solid #1a3333; padding: 20px; border-radius: 15px; background: var(--card-bg); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .header { color: var(--main-green); font-weight: bold; font-size: 24px; letter-spacing: 2px; margin-bottom: 5px; }
        .sub-text { font-size: 10px; color: #888; margin-bottom: 20px; }
        .stats-row { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .stat-box { border: 1px solid #1a3333; padding: 10px; border-radius: 10px; width: 30%; }
        .stat-val { color: var(--main-green); font-weight: bold; display: block; }
        .stat-lbl { font-size: 9px; text-transform: uppercase; color: #666; }
        .pair-card { border: 1px solid var(--main-green); padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        input { background: #000; border: 1px solid #1a3333; color: #fff; padding: 12px; width: 85%; border-radius: 8px; margin: 15px 0; text-align: center; font-size: 16px; }
        .btn { background: var(--main-green); color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">GHOST TECH MD 👻</div>
        <div class="sub-text">// WHATSAPP BOT • UGANDA 🇺🇬 //</div>

        <div class="stats-row">
            <div class="stat-box"><span class="stat-val">Online</span><span class="stat-lbl">System</span></div>
            <div class="stat-box"><span class="stat-val">1000+</span><span class="stat-lbl">Cmds</span></div>
            <div class="stat-box"><span class="stat-val">Active</span><span class="stat-lbl">Bot</span></div>
        </div>

        <div class="pair-card">
            <div style="font-size: 12px; color: var(--main-green);">⚡ LINK WHATSAPP ACCOUNT</div>
            <input type="number" id="whatsappNum" placeholder="256704428225">
            <button class="btn" onclick="getPairCode()">Get Pairing Code</button>
        </div>
        <p style="font-size: 10px; color: #444; margin-top: 20px;">If it stays white, wait 30 seconds! ⏳</p>
    </div>

    <script>
        function getPairCode() {
            const n = document.getElementById('whatsappNum').value;
            if(!n) return alert("Wandiika namba yo!");
            // Redirection to the most stable engine
            window.location.href = "https://keith-v2-pairing.onrender.com/code?number=" + n;
        }
    </script>
</body>
</html>
