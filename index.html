<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GHOST TECH MD | HUB</title>
    <style>
        body { 
            background: url('https://raw.githubusercontent.com/bbyderrick99-gif/Theghost-/main/446794.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.8); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 2; border: 2px solid #00ff88; padding: 25px; border-radius: 20px; background: rgba(0,0,0,0.9); box-shadow: 0 0 25px #00ff88; max-width: 360px; width: 90%; }
        h1 { color: #00ff88; text-shadow: 0 0 10px #00ff88; font-size: 20px; margin-bottom: 5px; }
        .status { font-size: 10px; color: #ff0055; margin-bottom: 20px; letter-spacing: 2px; }
        
        input { background: #000; border: 1px solid #00ff88; color: #fff; padding: 12px; width: 85%; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 16px; }
        
        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-pair { background: #00ff88; color: #000; }
        .btn-scan { background: #ffffff; color: #000; }
        
        /* Loading Screen */
        #loading { display: none; margin-top: 15px; }
        .bar-container { width: 100%; background: #222; border-radius: 10px; height: 10px; margin-top: 10px; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: #00ff88; animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }

        .cmd-preview { font-size: 9px; color: #666; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GHOST TECH MD 👻</h1>
        <div class="status">SYSTEM: READY TO HAUNT</div>
        
        <div id="mainUI">
            <input type="number" id="phone" placeholder="256740035399">
            <button class="btn btn-pair" onclick="action('pair')">Get Pairing Code ⚡</button>
            <button class="btn btn-scan" onclick="action('scan')">Scan QR Code 📸</button>
        </div>

        <div id="loading">
            <p style="font-size: 12px; color: #00ff88;">CONNECTING TO GHOST SERVER...</p>
            <div class="bar-container"><div class="bar"></div></div>
        </div>

        <div class="cmd-preview">
            <span style="color:#00ff88;">[BAD CMDS]:</span> .kickall, .demoteall, .hidetag, .tagall, .bug, .crash
        </div>
    </div>
