<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GHOST TECH MD | Pairing</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .container { padding: 40px 20px; }
        .card { border: 2px solid #00ff00; padding: 30px; max-width: 350px; margin: auto; background: #0a0a0a; border-radius: 20px; box-shadow: 0 0 15px #00ff00; }
        input { background: #000; border: 1px solid #00ff00; color: #fff; padding: 15px; width: 85%; margin-bottom: 20px; font-size: 18px; border-radius: 10px; text-align: center; }
        .btn { background: #00ff00; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 16px; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GHOST TECH MD 👻</h1>
        <div class="card">
            <h3>PAIRING ENGINE</h3>
            <p style="color: #888; font-size: 12px;">Type 256... and wait 15 seconds</p>
            <input type="number" id="number" placeholder="256704428225">
            <button class="btn" onclick="startPairing()">GET CODE ⚡</button>
        </div>
    </div>

    <script>
        function startPairing() {
            const num = document.getElementById('number').value;
            if (!num) return alert("Wandiika ennamba yo!");
            
            // USING A BRAND NEW FAST SERVER
            window.location.href = "https://pair-engine-v3.onrender.com/code?number=" + num;
        }
    </script>
</body>
</html>
